<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IT Portal - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="card">
        <h2>Selamat Datang</h2>
        <p>Klik tombol di bawah untuk mendapatkan voucher WiFi hari ini.</p>
        
        <div id="voucherDisplay" style="margin: 20px 0; font-weight: bold; font-size: 1.2rem; color: #d63384;">
            <!-- Kode voucher akan muncul di sini -->
        </div>

        <button onclick="processClaim()" id="btnClaim">Klaim Voucher</button>
        <hr>
        <button onclick="handleLogout()" style="background-color: #dc3545;">Logout</button>
    </div>

    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/voucher.js"></script>
</body>
</html>
