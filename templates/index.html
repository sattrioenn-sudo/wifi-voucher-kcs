<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Voucher Kantor</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .voucher-box { background: #e9ecef; padding: 15px; border: 2px dashed #007bff; font-weight: bold; font-size: 1.2rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>📶 WiFi Voucher</h3>
        {% if voucher %}
            <p>Halo {{ nama }}, kode Anda:</p>
            <div class="voucher-box">{{ voucher }}</div>
            <p><small>Gunakan sebelum akhir hari ini.</small></p>
            <a href="/">Ambil lagi</a>
        {% else %}
            <form action="/claim" method="post">
                <input type="text" name="nama" placeholder="Nama / Divisi" required>
                <button type="submit">Dapatkan Voucher</button>
            </form>
            {% if error %}<p style="color: red;">{{ error }}</p>{% endif %}
        {% endif %}
    </div>
</body>
</html>
